<a class="brand-post-card" href="{{ include.post.url | relative_url }}">
  <p class="brand-kicker">{{ include.post.category }}</p>
  <h3 style="margin-top: 0.75rem;">{{ include.post.title }}</h3>
  <p style="margin-top: 0.5rem; font-size: 0.875rem;">{{ include.post.description | default: include.post.excerpt | strip_html | truncate: 120 }}</p>
  <div class="brand-post-meta">
    <span>{{ include.post.reading_time }}</span>
    <span>&middot;</span>
    <span>{{ include.post.date | date: "%b %d, %Y" }}</span>
  </div>
</a>
